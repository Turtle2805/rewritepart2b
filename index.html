<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyên Đề 50 Câu Viết Lại Câu Nâng Cao - Ms Lê Hằng English</title>
    <!-- Nhúng Google Fonts tròn trịa phong cách ứng dụng học tập -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #74B9FF, #A8E6CF, #FFD3B6, #FFAAA5, #E8A7A1);
            --correct-color: #00D26A;
            --wrong-color: #FF4757;
            --text-main: #2D3436;
            --card-bg: rgba(255, 255, 255, 0.96);
            --purple-accent: #8854C0;
        }

        body {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--text-main);
            background: var(--primary-gradient);
            background-size: 400% 400%;
            animation: loangMauNenChuyenDong 25s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes loangMauNenChuyenDong {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .pattern-overlay-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.15;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'><g fill='%23FFFFFF'><path d='M20,20 L26,32 L38,34 L29,42 L32,54 L20,47 L8,54 L11,42 L2,34 L14,32 Z'/><circle cx='120' cy='40' r='10'/><path d='M40,110 C40,98 60,92 80,104 C100,92 120,98 120,110 C120,122 40,122 40,110 Z' opacity='0.6'/><path d='M130,120 Q142,102 154,120 T166,120' stroke='%23FFFFFF' stroke-width='3' fill='none'/></g></svg>");
            animation: movingBackgroundPattern 40s linear infinite;
        }

        @keyframes movingBackgroundPattern {
            from { background-position: 0 0; }
            to { background-position: 320px 640px; }
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 24px;
            border-radius: 14px;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            border: 2px solid var(--purple-accent);
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            position: relative;
        }

        header h1 {
            font-size: 1rem;
            color: var(--purple-accent);
            margin: 0;
            font-weight: 900;
        }

        .important-notice-box {
            background: #FFF9E6;
            border: 4px dashed #FDCB6E;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 25px;
            box-shadow: 0 8px 0 rgba(253, 203, 110, 0.2);
            text-align: center;
        }

        .notice-title {
            font-size: 1.15rem;
            font-weight: 900;
            color: #D35400;
            margin-bottom: 6px;
            display: block;
        }

        .notice-content {
            font-size: 1rem;
            line-height: 1.5;
            color: #2D3436;
            font-weight: 700;
        }

        .quiz-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 22px;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.05);
            border: 3px solid #FFF;
            position: relative;
        }

        .question-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .question-number {
            background: var(--purple-accent);
            color: #FFF;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 12px;
            font-size: 0.95rem;
            box-shadow: 0 4px 0 #6c3da3;
            flex-shrink: 0;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.6;
            color: var(--text-main);
            margin-top: 2px;
        }

        .original-sentence-box {
            background: #F1F2F6;
            border-left: 5px solid var(--purple-accent);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 1.05rem;
            font-style: italic;
            font-weight: 700;
            color: #333;
        }

        .choices-grid {
            display: flex;
            flex-direction: column;
        }

        .choice-btn {
            display: flex;
            align-items: center;
            width: 100%;
            background: #FFF;
            border: 3px solid #E2E8F0;
            border-radius: 18px;
            padding: 12px 18px;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            color: var(--text-main);
            box-shadow: 0 6px 0 #E2E8F0;
            transition: all 0.1s ease;
        }

        .choice-btn:hover:not(:disabled) {
            transform: scale(1.01) translateY(-2px);
            border-color: #B2BEC3;
            box-shadow: 0 8px 0 #B2BEC3;
        }

        .choice-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #B2BEC3;
        }

        .choice-prefix {
            background: #F1F5F9;
            border-radius: 10px;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 12px;
            color: #64748B;
            flex-shrink: 0;
        }

        .choice-btn.correct-state {
            background-color: #E6FBF1 !important;
            border-color: var(--correct-color) !important;
            box-shadow: 0 6px 0 #00A955 !important;
            color: #006633 !important;
        }

        .choice-btn.correct-state .choice-prefix {
            background-color: var(--correct-color) !important;
            color: white !important;
        }

        .choice-btn.wrong-state {
            background-color: #FFEBEB !important;
            border-color: var(--wrong-color) !important;
            box-shadow: 0 6px 0 #D63031 !important;
            color: #99222A !important;
        }

        .choice-btn.wrong-state .choice-prefix {
            background-color: var(--wrong-color) !important;
            color: white !important;
        }

        .shake-animation {
            animation: shakeEffect 0.4s ease-in-out;
        }

        @keyframes shakeEffect {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .explanation-box {
            margin-top: 18px;
            background: #F8F9FA;
            border-radius: 18px;
            padding: 18px;
            border-left: 6px solid var(--purple-accent);
            display: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.04);
        }

        .explanation-title {
            font-weight: 900;
            color: var(--purple-accent);
            font-size: 1.05rem;
            margin-bottom: 10px;
        }

        .explanation-step {
            margin-bottom: 10px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #4A5568;
        }

        .step-heading {
            font-weight: 900;
            color: #2D3748;
            margin-bottom: 2px;
        }

        .footer-action-wrapper {
            text-align: center;
            margin: 40px 0;
        }

        .submit-exam-btn {
            background: #00D26A;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 16px 60px;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #00A955, 0 12px 25px rgba(0,0,0,0.12);
            font-family: inherit;
            transition: all 0.15s;
        }

        .submit-exam-btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 11px 0 #00A955, 0 15px 30px rgba(0,0,0,0.18);
        }

        .submit-exam-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #00A955;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-body-card {
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 4px solid var(--purple-accent);
            transform: scale(0.8);
            transition: all 0.25s ease;
        }

        .modal-overlay.active .modal-body-card {
            transform: scale(1);
        }

        .modal-header-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--purple-accent);
            margin-bottom: 10px;
        }

        .modal-score-badge {
            font-size: 3.5rem;
            font-weight: 900;
            color: #00D26A;
            margin: 15px 0;
        }

        .modal-comment-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #2D3436;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .modal-reload-btn {
            background: var(--purple-accent);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 0 #6c3da3;
        }

        #canvas-confetti-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="pattern-overlay-layer"></div>
    <canvas id="canvas-confetti-layer"></canvas>

    <div class="container">
        <header>
            <h1>Giáo viên tạo: Ms Lê Hằng English</h1>
        </header>

        <div class="important-notice-box">
            <span class="notice-title">⚠️ LỜI NHẮC QUAN TRỌNG CỦA CÔ LÊ HẰNG ⚠️</span>
            <span class="notice-content">
                Toàn bộ 50 câu dưới đây là các cấu trúc viết lại câu nâng cao tinh tuyển cực hay xuất hiện trong đề thi Chuyên.<br>
                Hãy rèn luyện tư duy phân tích kỹ càng, không đoán mò con nhé!
            </span>
        </div>

        <div id="quiz-dynamic-render-target"></div>

        <div class="footer-action-wrapper">
            <button class="submit-exam-btn" onclick="processExamGrading()">🎉 NỘP BÀI KIỂM TRA 🎉</button>
        </div>
    </div>

    <div class="modal-overlay" id="result-summary-popup">
        <div class="modal-body-card">
            <div class="modal-header-title">🏆 KẾT QUẢ ĐẠT ĐƯỢC 🏆</div>
            <div class="modal-score-badge" id="score-counter-slot">0/0</div>
            <div class="modal-comment-text" id="teacher-feedback-slot">Lời khuyên...</div>
            <button class="modal-reload-btn" onclick="resetAndRestartQuiz()">THỬ SỨC LẠI</button>
        </div>
    </div>

    <script>
        const questionsDatabase = [
            {
                id: 51,
                original: "She liked Paris very little, and Rome less.",
                text: "Chọn câu viết lại đúng nhất bắt đầu bằng <b>She thought Rome...</b>:",
                choices: [
                    { text: "was even less attractive than Paris.", key: "A" },
                    { text: "was more interesting than Paris.", key: "B" },
                    { text: "is less interesting than Paris.", key: "C" },
                    { text: "was as interesting as Paris.", key: "D" }
                ], correct: "A",
                exp: ["Cô ấy rất ít thích Paris, và thích Rome ít hơn nữa.", "Cấu trúc so sánh hơn mang tính phủ định nhấn mạnh mức độ kém hơn.", "Đúng vì 'even less attractive' diễn tả việc Rome còn ít hấp dẫn hơn cả Paris.", "Các câu khác sai về thì động từ hoặc đảo ngược hoàn toàn logic ý nghĩa của câu gốc."]
            },
            {
                id: 52,
                original: "Turn off all switches before leaving the workshop.",
                text: "Chọn câu viết lại ở thể bị động mệnh lệnh chính xác nhất:",
                choices: [
                    { text: "must be turned off before leaving the workshop.", key: "A" },
                    { text: "should turn off before leaving the workshop.", key: "B" },
                    { text: "must turn off before leaving the workshop.", key: "C" },
                    { text: "are turned off before you leave the workshop.", key: "D" }
                ], correct: "A",
                exp: ["Hãy tắt tất cả các công tắc điện trước khi rời khỏi xưởng làm việc.", "Bị động của câu mệnh lệnh bắt buộc, sử dụng động từ khuyết thiếu 'must be + V3/ed'.", "Đúng cấu trúc bị động bắt buộc: 'All the switches must be turned off...'.", "Các câu còn lại sai vì dùng thể chủ động hoặc sai cấu tạo động từ."]
            },
            {
                id: 53,
                original: "We couldn’t relax until all the guests had gone home.",
                text: "Chọn câu sử dụng cấu trúc đảo ngữ thời gian <b>Only...</b>:",
                choices: [
                    { text: "Only when all the guests had gone home could we relax.", key: "A" },
                    { text: "Only until all the guests had gone home we could relax.", key: "B" },
                    { text: "Only after all the guests had gone home we could relax.", key: "C" },
                    { text: "Only when all the guests had gone home we could relax.", key: "D" }
                ], correct: "A",
                exp: ["Chúng tôi không thể thư giãn cho đến khi tất cả khách khứa đã đi về nhà.", "Cấu trúc đảo ngữ: 'Only when / Only after + Mệnh đề 1 + Trợ động từ + S + V'.", "Đúng vì có đảo trợ động từ khuyết thiếu 'could' lên trước chủ ngữ 'we'.", "Các đáp án khác vi phạm nguyên tắc vì chưa đảo ngữ ở vế mệnh đề chính."]
            },
            {
                id: 54,
                original: "House prices have risen sharply this year.",
                text: "Chọn câu viết lại dùng cụm danh từ bắt đầu bằng <b>There has...</b>:",
                choices: [
                    { text: "been a sharp rise in house prices this year.", key: "A" },
                    { text: "been a sharply rise in house prices this year.", key: "B" },
                    { text: "been a sharp raise in house prices this year.", key: "C" },
                    { text: "had a sharp rise in house prices this year.", key: "D" }
                ], correct: "A",
                exp: ["Giá nhà đất đã tăng mạnh mẽ trong năm nay.", "Chuyển động từ quá khứ 'risen sharply' sang cụm danh từ tương ứng 'a sharp rise in'.", "Đúng công thức: 'There has been + a/an + Adj + N + in + Sth'.", "Sai vì dùng trạng từ bổ nghĩa danh từ hoặc dùng sai động từ ngoại tác 'raise'."]
            },
            {
                id: 55,
                original: "She furiously threw the book across the room.",
                text: "Chọn câu sử dụng cấu trúc đảo ngữ nhấn mạnh mức độ tính chất <b>Such...</b>:",
                choices: [
                    { text: "was her fury that she threw the book across the room.", key: "A" },
                    { text: "her fury was that she threw the book across the room.", key: "B" },
                    { text: "such a furious she was that she threw the book across the room.", key: "C" },
                    { text: "fury did she have that she threw the book across the room.", key: "D" }
                ], correct: "A",
                exp: ["Cô ấy tức giận ném cuốn sách băng qua căn phòng.", "Cấu trúc đảo ngữ với Such: 'Such + be + N + that + Clause'. Danh từ của 'furiously' là 'fury'.", "Đúng cấu trúc đảo động từ 'was' lên trước danh từ 'her fury'.", "Các phương án khác sắp xếp sai trật tự từ nghiêm trọng."]
            },
            {
                id: 56,
                original: "Experts think that all dogs evolved from wolves.",
                text: "Chọn câu chuyển sang cấu trúc bị động khách quan số nhiều thích hợp:",
                choices: [
                    { text: "thought to have evolved from wolves.", key: "A" },
                    { text: "thought to evolve from wolves.", key: "B" },
                    { text: "thinking to have evolved from wolves.", key: "C" },
                    { text: "believed that they evolved from wolves.", key: "D" }
                ], correct: "A",
                exp: ["Các chuyên gia nghĩ rằng tất cả các loài chó đều tiến hóa từ loài sói.", "Bị động khách quan dạng đặc biệt khi vế sau xảy ra trước vế trước.", "Đúng vì dùng 'to have + V3/ed' để biểu thị hành động tiến hóa đã diễn ra trong quá khứ.", "Sai vì chia sai cấu trúc thời gian hoặc dùng sai thể chủ động."]
            },
            {
                id: 57,
                original: "The northwest of Britain has more rain each year than the southeast.",
                text: "Chọn câu viết lại dùng cụm danh từ bắt đầu bằng <b>The annual...</b>:",
                choices: [
                    { text: "rainfall in the northwest of Britain is higher than that in the southeast.", key: "A" },
                    { text: "rain in the northwest of Britain is more than the southeast.", key: "B" },
                    { text: "rainfall in the northwest of Britain has more than the southeast.", key: "C" },
                    { text: "annual rain of Britain is higher in the northwest than the southeast.", key: "D" }
                ], correct: "A",
                exp: ["Phía tây bắc nước Anh có nhiều mưa mỗi năm hơn phía đông nam.", "Chuyển ý có nhiều mưa sang lượng mưa hàng năm ('annual rainfall') kết hợp đại từ thay thế 'that'.", "Đúng ngữ pháp, 'that' thay thế cho danh từ 'rainfall' phía trước tránh lặp từ.", "Các câu khác vi phạm lỗi so sánh không đồng đẳng."]
            },
            {
                id: 58,
                original: "The two theories appear to be completely different. (COMMON)",
                text: "Chọn câu viết lại sử dụng từ gợi ý trong ngoặc <b>COMMON</b>:",
                choices: [
                    { text: "two theories appear to have nothing in common.", key: "A" },
                    { text: "two theories have completely different in common.", key: "B" },
                    { text: "two theories appear to be out of common.", key: "C" },
                    { text: "two theories don't have anything in common completely.", key: "D" }
                ], correct: "A",
                exp: ["Hai học thuyết này có vẻ hoàn toàn khác biệt nhau.", "Thành ngữ 'have nothing in common' mang nghĩa là không có điểm chung nào, tương đương với 'completely different'.", "Đúng cấu trúc thành ngữ đi kèm động từ liên kết 'appear'.", "Các câu khác sử dụng sai cụm từ cố định."]
            },
            {
                id: 59,
                original: "His rude behaviour is too much for me. (PUT)",
                text: "Chọn câu viết lại sử dụng cụm động từ tương đương nghĩa với từ <b>PUT</b>:",
                choices: [
                    { text: "cannot put up with his rude behaviour.", key: "A" },
                    { text: "cannot put down with his rude behaviour.", key: "B" },
                    { text: "must put off his rude behaviour.", key: "C" },
                    { text: "can put up with his rude behaviour.", key: "D" }
                ], correct: "A",
                exp: ["Hành vi thô lỗ của anh ta là quá sức chịu đựng đối với tôi.", "Phrasal verb 'put up with' mang nghĩa là chịu đựng điều gì phiền toái.", "Đúng nghĩa: 'Tôi không thể chịu đựng nổi hành vi thô lỗ của anh ta nữa'.", "Sai phrasal verb hoặc ngược nghĩa gốc."]
            },
            {
                id: 60,
                original: "I find his handwriting very hard to read. (DIFFICULTY)",
                text: "Chọn câu viết lại sử dụng danh từ chỉ mức độ cản trở <b>DIFFICULTY</b>:",
                choices: [
                    { text: "have great difficulty reading his handwriting.", key: "A" },
                    { text: "have great difficulty to read his handwriting.", key: "B" },
                    { text: "find difficulty in reading his handwriting hard.", key: "C" },
                    { text: "make difficulty reading his handwriting.", key: "D" }
                ], correct: "A",
                exp: ["Tớ thấy chữ viết tay của anh ấy rất khó đọc.", "Cấu trúc thành ngữ: 'have difficulty (in) + V-ing' (gặp khó khăn khi làm việc gì).", "Đúng hình thái danh động từ 'reading' theo sau danh từ difficulty.", "Sai lỗi dùng động từ có 'to' hoặc dùng sai động từ đi kèm cố định."]
            },
            {
                id: 61,
                original: "He doesn’t have money to go on holiday. He doesn’t have time, either.",

        function playDingSound() {
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.08);
                osc.frequency.setValueAtTime(783.99, now + 0.16);
                osc.frequency.setValueAtTime(1046.50, now + 0.24);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.22, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.5);
            } catch(e) {}
        }

        function playBuzzSound() {
            try {
                const now = audioCtx.currentTime;
                const frequencies = [392.00, 349.23, 261.63];
                frequencies.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + (idx * 0.12));
                    gain.gain.setValueAtTime(0, now + (idx * 0.12));
                    gain.gain.linearRampToValueAtTime(0.18, now + (idx * 0.12) + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + (idx * 0.12) + 0.14);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + (idx * 0.12)); osc.stop(now + (idx * 0.12) + 0.14);
                });
            } catch(e) {}
        }

        function runConfettiExplosion() {
            const canvas = document.getElementById('canvas-confetti-layer');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = [];
            const paletteColors = ['#FFC107', '#FF5722', '#E91E63', '#9C27B0', '#00C9A7', '#00D26A', '#8854C0'];
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    radius: Math.random() * 4 + 4,
                    density: Math.random() * canvas.height,
                    color: paletteColors[Math.floor(Math.random() * paletteColors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltIncremental: Math.random() * 0.05 + 0.02,
                    angle: 0
                });
            }
            function animateConfettiFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let continueAnimation = false;
                particles.forEach((p) => {
                    p.angle += p.tiltIncremental;
                    p.y += (Math.cos(p.density) + 3 + p.radius / 2) / 1.8;
                    p.x += Math.sin(p.angle);
                    if (p.y <= canvas.height) continueAnimation = true;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                });
                if (continueAnimation) requestAnimationFrame(animateConfettiFrame);
            }
            animateConfettiFrame();
        }

        function shuffleArrayChoices(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
            return array;
        }

                shuffleArrayChoices(shuffledChoices);
                
                let choicesHtmlContent = '';
                shuffledChoices.forEach(choice => {
                    choicesHtmlContent += `
                        <button class="choice-btn" id="btn-choice-item-${q.id}-${choice.key}" onclick="evaluateUserChoice(${q.id}, '${choice.key}', '${q.correct}')">
                            <span class="choice-prefix">${choice.key}</span>
                            <span class="choice-body-text">${choice.text}</span>
                        </button>
                    `;
                });

                cardNode.innerHTML = `
                    <div class="question-header">
                        <div class="question-number">${idx + 51}</div>
                        <div class="question-text">${q.text}</div>
                    </div>
                    <div class="original-sentence-box">Câu gốc: "${q.original}"</div>
                    <div class="choices-grid" id="choices-grid-box-id-${q.id}">
                        ${choicesHtmlContent}
                    </div>
                    
                    <div class="explanation-box" id="explanation-box-view-id-${q.id}">
                        <div class="explanation-title">💡 PHẦN GIẢI THÍCH CHI TIẾT TỪ CÔ LÊ HẰNG:</div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 1: Dịch nghĩa câu hỏi gốc</div>
                            <div>${q.exp[0]}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 2: Bản chất cấu trúc ngữ pháp nâng cao</div>
                            <div>${q.exp[1]}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 3: Tại sao đáp án này ĐÚNG?</div>
                            <div style="font-weight: 700; color: #00A955;">${q.exp[2]}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 4: Tại sao các phương án khác SAI?</div>
                            <div>${q.exp[3]}</div>
                        </div>
                    </div>
                `;
                quizTarget.appendChild(cardNode);
            });
        }

        function evaluateUserChoice(questionId, chosenKey, correctKey) {
            if (trackedStudentAnswers[questionId] !== undefined) return;
            trackedStudentAnswers[questionId] = chosenKey;
            
            const targetBtnNode = document.getElementById(`btn-choice-item-${questionId}-${chosenKey}`);
            const correctBtnNode = document.getElementById(`btn-choice-item-${questionId}-${correctKey}`);
            const parentCardNode = document.getElementById(`card-wrapper-id-${questionId}`);
            
            if (chosenKey === correctKey) {
                targetBtnNode.classList.add('correct-state');
                playDingSound();
                runConfettiExplosion();
            } else {
                targetBtnNode.classList.add('wrong-state');
                if (correctBtnNode) correctBtnNode.classList.add('correct-state');
                parentCardNode.classList.add('shake-animation');
                playBuzzSound();
                setTimeout(() => parentCardNode.classList.remove('shake-animation'), 450);
            }

            const childrenButtons = document.getElementById(`choices-grid-box-id-${questionId}`).getElementsByClassName('choice-btn');
            for (let btn of childrenButtons) { btn.disabled = true; }

            document.getElementById(`explanation-box-view-id-${questionId}`).style.display = 'block';
        }

        function processExamGrading() {
            let correctCount = 0;
            const totalQuestionsCount = questionsDatabase.length;
            
            questionsDatabase.forEach(q => {
                if (trackedStudentAnswers[q.id] === q.correct) {
                    correctCount++;
                }
            });

            const rawSuccessPercentage = (correctCount / totalQuestionsCount) * 100;
            const scoreDisplaySlot = document.getElementById('score-counter-slot');
            const commentDisplaySlot = document.getElementById('teacher-feedback-slot');

            scoreDisplaySlot.innerText = `${correctCount} / ${totalQuestionsCount}`;

            if (rawSuccessPercentage < 50) {
                commentDisplaySlot.innerText = "Điểm số chưa như kỳ vọng. Con hãy xem kỹ lại các phần giải thích 4 bước để nắm chắc các cấu trúc bẫy của đề chuyên nhé! Cô tin con sẽ tiến bộ! 💕";
            } else if (rawSuccessPercentage >= 50 && rawSuccessPercentage <= 85) {
                commentDisplaySlot.innerText = "Kết quả rất khả quan! Con hãy ghi lại những câu bị nhầm lẫn vào sổ tay ôn tập để chuẩn bị tốt nhất cho kỳ thi Chuyên nhé! 🌟";
            } else {
                commentDisplaySlot.innerText = "Tuyệt vời! Tư duy ngữ pháp và từ vựng Chuyên Anh của con đạt mức xuất sắc. Hãy tự tin bước vào phòng thi con nhé! 🎉💎";
            }

            document.getElementById('result-summary-popup').classList.add('active');
        }

        function resetAndRestartQuiz() {
            document.getElementById('result-summary-popup').classList.remove('active');
            trackedStudentAnswers = {};
            buildAndRenderInterface();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            buildAndRenderInterface();
        };
    </script>
</body>
</html>
